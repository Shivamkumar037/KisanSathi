<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiVani</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-gradient-to-b from-green-50 via-white to-green-100 min-h-screen pb-20">

<div class="max-w-[428px] mx-auto bg-white min-h-screen shadow-2xl overflow-hidden rounded-xl">

    <!-- Header -->
    <!-- Header -->
<div class="header-3d flex items-center justify-between px-4 py-4">

    <div class="flex flex-col">
        <h1 class="logo-title">🌾 KrishiVani</h1>
        <span class="text-xs text-green-100">Smart Farmer Assistant</span>
    </div>

    <div class="flex items-center gap-3">

        <div class="location-pill">
            <i class="fa-solid fa-location-dot"></i>
            Gorakhpur
        </div>

        <img src="https://i.ibb.co/0jZ3k7k/farmer-avatar.png"
        class="profile-avatar">
        
    </div>

</div>


    <!-- Page Content -->
    <div class="p-4 space-y-4">

        {% block content %}
        {% endblock %}

    </div>


    <!-- Bottom Navigation -->
   <!-- Bottom Navigation -->
<div class="bottom-nav">

    <a href="/home" class="nav-item active">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>

    <a href="/community" class="nav-item">
        <i class="fas fa-comments"></i>
        <span>Community</span>
    </a>

    <a href="/voice" class="nav-item voice-main">
        <i class="fas fa-microphone"></i>
    </a>

    <a href="/schemes" class="nav-item">
        <i class="fas fa-seedling"></i>
        <span>Schemes</span>
    </a>

    <a href="/market" class="nav-item">
        <i class="fas fa-balance-scale"></i>
        <span>Mandi</span>
    </a>

</div>

</div>


<!-- JS -->
<script src="/static/js/main.js"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
