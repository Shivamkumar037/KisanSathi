{% extends 'base.html' %}
{% block content %}
<div class="p-4 text-center">
    <h2 class="text-2xl font-bold">My Profile</h2>
    <div id="profileInfo" class="mt-8"></div>
</div>
<script>
fetch('/api/profile', { headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')} })
    .then(r => r.json()).then(data => {
        document.getElementById('profileInfo').innerHTML = `<p class="text-xl">${data.name}</p><p>${data.phone} • ${data.district}</p>`;
    });
</script>
{% endblock %}
