{% extends 'base.html' %}
{% block content %}
<div class="p-4">
    <h2 class="text-2xl font-bold mb-2">Market Rates</h2>
    <p class="text-green-600 mb-6">Gorakhpur Mandi, UP</p>
    <div id="ratesList" class="space-y-4"></div>
</div>
<script>
fetch('/api/market').then(r => r.json()).then(data => {
    const list = document.getElementById('ratesList');
    data.rates.forEach(r => {
        list.innerHTML += `<div class="bg-white p-5 rounded-3xl shadow flex justify-between"><div><h4 class="font-semibold">${r.commodity}</h4></div><div class="text-right"><p>₹${r.min} - ₹${r.max}</p><p class="text-green-600">Avg: ₹${r.avg}</p></div></div>`;
    });
});
</script>
{% endblock %}
