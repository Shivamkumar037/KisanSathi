{% extends 'base.html' %}
{% block content %}
<div class="p-4 h-[calc(100vh-180px)] flex flex-col">
    <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 mb-4 p-4 bg-gray-50 rounded-3xl"></div>
    <div class="flex gap-2 p-4 border-t bg-white">
        <input id="userMsg" type="text" placeholder="Apna sawal yahan likhiye..." class="flex-1 border border-gray-300 rounded-3xl px-5 py-3">
        <button onclick="sendMessage()" class="bg-green-600 text-white px-8 rounded-3xl">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const msg = document.getElementById('userMsg').value.trim();
    if (!msg) return;

    const box = document.getElementById('chatBox');
    box.innerHTML += `<div class="text-right"><div class="bg-green-100 px-4 py-3 rounded-3xl">${msg}</div></div>`;
    document.getElementById('userMsg').value = '';

    try {
        const res = await fetch('/api/chat/message', {
            method: 'POST',
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        box.innerHTML += `<div class="text-left"><div class="bg-white shadow px-4 py-3 rounded-3xl">${data.response}</div></div>`;
        box.scrollTop = box.scrollHeight;
    } catch(e) {
        console.error(e);
    }
}
</script>
{% endblock %}
