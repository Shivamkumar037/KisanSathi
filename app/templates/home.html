{% extends 'base.html' %}
{% block content %}
<div class="p-4">
    <h2 id="welcomeText" class="text-xl font-semibold mb-4">Welcome back, Kisan! 🌾</h2>

    <!-- Weather -->
    <div class="bg-white rounded-3xl shadow p-4 mb-6">
        <h3 class="font-medium mb-3">Agle 10 Din ka Mausam</h3>
        <div id="weatherContainer" class="grid grid-cols-5 gap-3 text-center"></div>
    </div>

    <!-- Quick Buttons -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <a href="/analysis" class="bg-white p-6 rounded-3xl shadow text-center hover:bg-green-50">📸 Crop Analysis</a>
        <a href="/chat" class="bg-white p-6 rounded-3xl shadow text-center hover:bg-green-50">💬 AI Chat</a>
    </div>

    <!-- Community Posts -->
    <h3 class="font-semibold mb-4">Community Posts</h3>
    <div id="postsContainer" class="space-y-6"></div>
</div>

<script>
function loadPosts() {
    fetch('/api/community/posts')
        .then(res => res.json())
        .then(data => {
            var container = document.getElementById('postsContainer');
            container.innerHTML = '';

            data.posts.forEach(function(post) {
                var html = 
                '<div class="bg-white rounded-3xl shadow p-5">' +
                    '<div class="flex justify-between mb-2">' +
                        '<p class="font-semibold">' + post.author + '</p>' +
                        '<p class="text-xs text-gray-500">' + post.time + '</p>' +
                    '</div>' +
                    '<h4 class="font-medium">' + post.title + '</h4>' +
                    '<p class="text-gray-700 mt-1">' + post.problem + '</p>';

                if (post.cloudinary_url) {
                    html += '<img src="' + post.cloudinary_url + '" class="mt-3 rounded-2xl w-full">';
                }

                html += 
                    '<div class="flex gap-6 mt-4 text-sm">' +
                        '<button onclick="toggleLike(' + post.id + ')" class="flex items-center gap-1 text-red-500">❤️ <span id="likeCount_' + post.id + '">' + post.likes + '</span></button>' +
                        '<button onclick="showCommentBox(' + post.id + ')" class="flex items-center gap-1">💬 Comment</button>' +
                    '</div>' +

                    '<div id="commentBox_' + post.id + '" class="hidden mt-3 flex gap-2">' +
                        '<input id="commentInput_' + post.id + '" type="text" placeholder="Comment likhiye..." class="flex-1 border border-gray-300 rounded-2xl px-4 py-2 text-sm">' +
                        '<button onclick="addComment(' + post.id + ')" class="bg-green-600 text-white px-5 py-1 rounded-2xl text-sm">Send</button>' +
                    '</div>' +
                '</div>';

                container.innerHTML += html;
            });
        });
}

window.toggleLike = function(postId) {
    fetch('/api/community/like/' + postId, { method: 'POST' })
        .then(() => loadPosts());
};

window.showCommentBox = function(postId) {
    var box = document.getElementById('commentBox_' + postId);
    box.classList.toggle('hidden');
};

window.addComment = function(postId) {
    var input = document.getElementById('commentInput_' + postId);
    var text = input.value.trim();
    if (!text) return;

    fetch('/api/community/comment/' + postId, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    }).then(() => {
        input.value = '';
        loadPosts();
    });
};

// Page load
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/profile')
        .then(res => res.json())
        .then(user => {
            document.getElementById('welcomeText').innerHTML = 'Welcome back, ' + user.name + '! 🌾';
        });

    fetch('/api/dashboard')
        .then(res => res.json())
        .then(wdata => {
            var container = document.getElementById('weatherContainer');
            wdata.weather.forEach(function(day) {
                var div = document.createElement('div');
                div.innerHTML = '<p class="text-xs">' + day.date + '</p><p class="text-lg font-semibold">' + day.temp + '°C</p>';
                container.appendChild(div);
            });
        });

    loadPosts();
});
</script>
{% endblock %}
